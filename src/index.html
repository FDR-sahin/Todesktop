<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link href="./output.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="p-5 flex justify-between items-center">
      <a href="#" id="brand" class="flex items-center gap-2">
        <img
          class="w-12 h-12 object-cover"
          src="/assets/asset 0.png"
          alt="Logo"
        />
        <span class="text-lg font-bold font-display">ToDesktop</span>
      </a>

      <div id="nav-menu" class="hidden lg:flex gap-12">
        <a href="#" class="font-medium hover:text-primary">Pricing</a>
        <a href="#" class="font-medium hover:text-primary">Docs</a>
        <a href="#" class="font-medium hover:text-primary">Changelog</a>
        <a href="#" class="font-medium hover:text-primary">Blogs</a>
        <a href="#" class="font-medium hover:text-primary">Login</a>
      </div>

      <button
        class="hidden lg:flex gap-3 items-center border border-gray-400 px-4 py-2 rounded-lg hover:border-gray-700"
      >
        <img src="../assets/asset 1.svg" alt="" />
        <span class="font-medium">Electron Develover</span>
        <i class="fa-solid fa-arrow-right"></i>
      </button>

      <button class="p-3 md:hidden" onclick="handelMenu()">
        <i class="fa-solid fa-bars text-gray-600"></i>
      </button>

      <div id="nav-dialog" class="hidden fixed z-10 md:hidden inset-0 bg-white p-5 ">
        <div id="nav-bar" class="flex justify-between items-center">
          <a href="#" id="brand" class="flex items-center gap-2">
            <img
              class="w-12 h-12 object-cover"
              src="/assets/asset 0.png"
              alt="Logo"
            />
            <span class="text-lg font-bold font-display">ToDesktop</span>
          </a>

          <button class="p-3 md:hidden" onclick="handelMenu()">
        <i class="fa-solid fa-x"></i>
           </button>

        </div>

         <div id="nav-menu" class="flex flex-col gap-3 my-5 ">
        <a href="#" class="font-medium hover:text-primary hover:bg-gray-50 p-2 ">Pricing</a>
        <a href="#" class="font-medium hover:text-primary hover:bg-gray-50 p-2 ">Docs</a>
        <a href="#" class="font-medium hover:text-primary hover:bg-gray-50 p-2 ">Changelog</a>
        <a href="#" class="font-medium hover:text-primary hover:bg-gray-50 p-2 ">Blogs</a>
        <a href="#" class="font-medium hover:text-primary hover:bg-gray-50 p-2 rounded border-b border-b-gray-200">Login</a>
      </div>

      <button
        class="flex gap-3 items-center w-full border border-gray-400 px-4 py-3  rounded-lg hover:border-gray-700"
      >
        <img src="../assets/asset 1.svg" alt="" />
        <span class="font-medium">Electron Develover</span>
        
      </button>

      </div>
    </nav>

    <script src="./script.js"></script>
  </body>
</html>
